name: PR check (compile gate)

# Verification Tier 0 — static compile on every PR that touches Swift/Xcode.
# Portable across iOS repos: reads scheme/project from .github/repo-meta.yml.
# KatafractStyle is a local SPM package (../KatafractStyle) — cloned as sibling.

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/*.pbxproj'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/pr-check.yml'
      - '.github/repo-meta.yml'
  # Also run on branch push (not main): App-token / GITHUB_TOKEN events don't
  # trigger workflows, so an App-created PR never fires pull_request — but a real
  # branch push does, landing the check on the SHA before the PR exists.
  push:
    branches-ignore: [main]
    paths:
      - '**/*.swift'
      - '**/*.xcodeproj/**'
      - '**/*.pbxproj'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/pr-check.yml'
      - '.github/repo-meta.yml'

concurrency:
  group: pr-check-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile (iOS device, no signing)
    runs-on: [self-hosted, macOS, ios-build]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone sibling KatafractStyle
        run: |
          PARENT="$(dirname "$GITHUB_WORKSPACE")"
          if [ ! -d "$PARENT/KatafractStyle/.git" ]; then
            git clone --depth 1 https://github.com/katafract-io/KatafractStyle "$PARENT/KatafractStyle"
          else
            git -C "$PARENT/KatafractStyle" fetch --depth 1 origin main && git -C "$PARENT/KatafractStyle" reset --hard origin/main
          fi

      - name: Read repo-meta.yml
        id: meta
        run: |
          set -euo pipefail
          if [ ! -f .github/repo-meta.yml ]; then
            echo "::error::.github/repo-meta.yml missing"; exit 1
          fi
          SCHEME=$(awk -F': *' '/^scheme:/ {print $2; exit}' .github/repo-meta.yml | tr -d '"' | tr -d "'")
          PROJECT=$(awk -F': *' '/^project:/ {print $2; exit}' .github/repo-meta.yml | tr -d '"' | tr -d "'")
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME project=$PROJECT"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -scheme "${{ steps.meta.outputs.scheme }}" \
                     -project "${{ steps.meta.outputs.project }}" \
                     -derivedDataPath "${{ runner.temp }}/dd-${{ github.run_id }}-${{ github.run_attempt }}" \
                     -resolvePackageDependencies 2>&1 | tail -10

      - name: Compile (Release, iOS device, no signing)
        run: |
          set -o pipefail
          if xcodebuild build \
            -scheme "${{ steps.meta.outputs.scheme }}" \
            -project "${{ steps.meta.outputs.project }}" \
            -derivedDataPath "${{ runner.temp }}/dd-${{ github.run_id }}-${{ github.run_attempt }}" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee /tmp/xcbuild.log; then
            rc=0
          else
            rc=$?
          fi
          echo "::group::compile errors/warnings"
          grep -E ": (error|warning):" /tmp/xcbuild.log | head -100 || true
          echo "::endgroup::"
          if [ "$rc" -ne 0 ]; then
            echo "::error::xcodebuild build failed (rc=$rc)"
            exit "$rc"
          fi
          echo "Compile succeeded (clean, or warnings-only)."
