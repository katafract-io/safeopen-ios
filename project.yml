name: SafeOpen
options:
  bundleIdPrefix: com.katafract
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "15"
    DEVELOPMENT_TEAM: "2SGGP65W6C"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym


packages:
  KatafractStyle:
    url: https://github.com/katafract-io/KatafractStyle
    from: "0.1.2"

targets:
  SafeOpen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SafeOpen
        excludes:
          - "Docs/**"
          - "Preview Content/**"
    resources:
      - SafeOpen/Assets.xcassets
      - SafeOpen/Preview Content/Preview Assets.xcassets
      - SafeOpen/PrivacyInfo.xcprivacy
    info:
      path: SafeOpen/Info.plist
      properties:
        CFBundleName: SafeOpen
        CFBundleDisplayName: SafeOpen
        CFBundleIdentifier: com.katafract.safeopen
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "SafeOpen needs camera access to scan QR codes."
        NSPhotoLibraryUsageDescription: "SafeOpen can read QR codes from your photo library."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.katafract.safeopen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: SafeOpen/Info.plist
        CODE_SIGN_ENTITLEMENTS: SafeOpen/SafeOpen.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: KatafractStyle
        product: KatafractStyle
    entitlements:
      path: SafeOpen/SafeOpen.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: production
        com.apple.developer.networking.HotspotConfiguration: true

  SafeOpenShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SafeOpenShareExtension
    info:
      path: SafeOpenShareExtension/Info.plist
      properties:
        CFBundleName: SafeOpenShare
        CFBundleDisplayName: SafeOpenShare
        CFBundleIdentifier: com.katafract.safeopen.ShareExtension
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
          NSExtensionPointIdentifier: com.apple.share-services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.katafract.safeopen.ShareExtension
        CODE_SIGN_ENTITLEMENTS: SafeOpenShareExtension/SafeOpenShareExtension.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/PlugIns"
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: SafeOpenShareExtension/SafeOpenShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.katafract.enclave

  SafeOpenUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SafeOpenUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.katafract.safeopen.UITests
        TEST_TARGET_NAME: SafeOpen
    dependencies:
      - target: SafeOpen
