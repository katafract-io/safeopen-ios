name: SafeOpen
options:
  bundleIdPrefix: com.katafract
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "23"
    DEVELOPMENT_TEAM: "2SGGP65W6C"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  SafeOpen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SafeOpen
        excludes:
          - "Docs/**"
          - "Preview Content/**"
    resources:
      - SafeOpen/Assets.xcassets
      - SafeOpen/Preview Content/Preview Assets.xcassets
    info:
      path: SafeOpen/Info.plist
      properties:
        CFBundleName: SafeOpen
        CFBundleDisplayName: SafeOpen
        CFBundleIdentifier: com.katafract.safeopen
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "SafeOpen needs camera access to scan QR codes."
        NSPhotoLibraryUsageDescription: "SafeOpen can read QR codes from your photo library."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.katafract.safeopen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: SafeOpen/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
